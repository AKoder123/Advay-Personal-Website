<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advay Kumar - Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Background -->
  <div class="bg">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Navigation -->
  <nav class="top-nav">
    <div class="nav-brand">AK</div>
    <div class="nav-actions">
      <button id="exportPdfBtn" type="button">Export PDF</button>
    </div>
  </nav>

  <!-- Progress Indicator -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <!-- Slide Counter -->
  <div class="slide-counter">
    <span class="current">1</span> / <span class="total">13</span>
  </div>

  <!-- Main Container -->
  <main class="slide-container" id="slideContainer">
    <!-- Slides will be injected here by app.js -->
  </main>

  <!-- Navigation Hints -->
  <div class="nav-hints">
    <span class="hint-key">SPACE</span> or <span class="hint-key">ARROWS</span> to navigate
  </div>

  <!-- PDF Export Stage (off-screen) -->
  <div id="pdfStage"></div>

  <script src="app.js"></script>
</body>
</html>
