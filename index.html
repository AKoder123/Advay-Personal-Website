<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>Loading…</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Background (cloned into #pdfStage during export) -->
  <div class="bg" aria-hidden="true">
    <div class="bg__noise"></div>
    <div class="bg__grid"></div>
    <div class="bg__orb bg__orb--a"></div>
    <div class="bg__orb bg__orb--b"></div>
    <div class="bg__orb bg__orb--c"></div>
  </div>

  <header class="topnav" id="topnav">
    <div class="topnav__left">
      <div class="brand" title="Home">
        <div class="brand__mark" aria-hidden="true">AK</div>
        <div class="brand__text">
          <div class="brand__title" id="deckTitle">…</div>
          <div class="brand__meta" id="deckTheme">…</div>
        </div>
      </div>
    </div>

    <div class="topnav__center" aria-label="Slide navigation">
      <button class="iconbtn" id="prevBtn" type="button" aria-label="Previous slide" title="Previous (← / Shift+Space)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="counter" id="counter" aria-live="polite">
        <span id="currentIdx">1</span><span class="counter__sep">/</span><span id="totalIdx">1</span>
      </div>

      <button class="iconbtn" id="nextBtn" type="button" aria-label="Next slide" title="Next (→ / Space)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="dots" id="dots" aria-hidden="true"></div>
    </div>

    <div class="topnav__right">
      <button id="exportPdfBtn" class="pillbtn" type="button" title="Export the deck to a multi-page PDF">
        <span class="pillbtn__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8 13h8M8 17h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="pillbtn__label" id="exportBtnLabel">Export PDF</span>
      </button>
    </div>
  </header>

  <main class="scroller" id="scroller" tabindex="-1">
    <div class="slides" id="slides" aria-label="Web deck"></div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <noscript>
    <div class="noscript">
      This deck needs JavaScript enabled.
    </div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
